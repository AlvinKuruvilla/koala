name: miri

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  miri:
    name: miri test (koala-std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}

      - name: Run miri tests for koala-std
        run: cargo miri test -p koala-std
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
